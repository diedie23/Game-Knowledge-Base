<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APM 知识库 — 访客统计管理</title>
<style>
/* ═══ 复用知识库深色主题设计令牌 ═══ */
:root {
  --bg: #0f1117;
  --sidebar-bg: #161822;
  --card-bg: #1c1f2e;
  --border: #2a2d3e;
  --text: #c9cdd4;
  --dim: #8b8fa3;
  --heading: #e8eaed;
  --accent: #6c8cff;
  --accent-light: #8ba3ff;
  --accent-bg: rgba(108,140,255,.08);
  --green: #4ade80;
  --green-bg: rgba(74,222,128,.08);
  --orange: #fb923c;
  --orange-bg: rgba(251,191,36,.08);
  --red: #f87171;
  --purple: #a78bfa;
  --purple-bg: rgba(167,139,250,.08);
  --cyan: #22d3ee;
  --cyan-bg: rgba(34,211,238,.08);
  --pink: #f472b6;
  --code-bg: #1a1d2d;
  --st: #3d4155;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.8; font-size: 16px;
  min-height: 100vh;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--st); border-radius: 3px; }

/* ═══ 登录遮罩 ═══ */
.login-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(15,17,23,.98); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(12px);
}
.login-overlay.hidden { display: none; }
.login-card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 18px; padding: 40px 44px; max-width: 420px; width: 92%;
  box-shadow: 0 24px 64px rgba(0,0,0,.5);
  animation: loginSlide .4s cubic-bezier(.4,0,.2,1);
}
@keyframes loginSlide { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.login-card h1 { font-size: 24px; color: var(--heading); font-weight: 800; margin-bottom: 6px; }
.login-card .sub { font-size: 14px; color: var(--dim); margin-bottom: 28px; }
.login-card input {
  width: 100%; padding: 14px 18px; border-radius: 12px;
  border: 1px solid var(--border); background: var(--bg);
  color: var(--text); font-size: 16px; outline: none;
  font-family: inherit; transition: border-color .15s;
}
.login-card input:focus { border-color: var(--accent); }
.login-card input::placeholder { color: var(--dim); }
.login-btn {
  width: 100%; padding: 14px; margin-top: 18px; border: none; border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: opacity .15s, transform .15s;
}
.login-btn:hover { opacity: .85; transform: translateY(-1px); }
.login-btn:active { transform: scale(.97); }
.login-error {
  color: var(--red); font-size: 13px; margin-top: 12px;
  text-align: center; min-height: 20px;
}

/* ═══ 主看板 ═══ */
.dashboard { max-width: 1400px; margin: 0 auto; padding: 32px 40px 80px; }
.dashboard.hidden { display: none; }

/* 顶栏 */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 36px; flex-wrap: wrap; gap: 16px;
}
.top-bar h1 {
  font-size: 28px; color: var(--heading); font-weight: 800;
  display: flex; align-items: center; gap: 12px;
}
.top-bar h1 span { font-size: 28px; }
.top-actions { display: flex; align-items: center; gap: 12px; }
.range-btn {
  padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border);
  background: none; color: var(--dim); font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.range-btn:hover { border-color: rgba(255,255,255,.2); color: var(--text); }
.range-btn.active { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); font-weight: 600; }
.back-btn {
  padding: 8px 18px; border-radius: 10px; border: 1px solid var(--border);
  background: none; color: var(--dim); font-size: 13px; cursor: pointer;
  font-family: inherit; transition: all .15s; text-decoration: none;
}
.back-btn:hover { border-color: var(--accent); color: var(--accent); }
.logout-btn {
  padding: 8px 18px; border-radius: 10px; border: 1px solid rgba(248,113,113,.3);
  background: rgba(248,113,113,.08); color: #fb7185; font-size: 13px;
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.logout-btn:hover { background: rgba(248,113,113,.18); border-color: rgba(248,113,113,.5); }

/* ═══ 统计卡片 4宫格 ═══ */
.stats-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px;
  margin-bottom: 36px;
}
@media (max-width: 900px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 500px) { .stats-grid { grid-template-columns: 1fr; } }
.stat-card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 16px; padding: 24px; position: relative;
  overflow: hidden; transition: all .22s;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px; border-radius: 16px 16px 0 0;
}
.stat-card:nth-child(1)::before { background: linear-gradient(90deg, var(--accent), var(--accent-light)); }
.stat-card:nth-child(2)::before { background: linear-gradient(90deg, var(--green), #86efac); }
.stat-card:nth-child(3)::before { background: linear-gradient(90deg, var(--purple), #c084fc); }
.stat-card:nth-child(4)::before { background: linear-gradient(90deg, var(--cyan), #67e8f9); }
.stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.3); }
.stat-label { font-size: 13px; color: var(--dim); margin-bottom: 10px; font-weight: 500; }
.stat-value {
  font-size: 36px; font-weight: 800; letter-spacing: -1px; line-height: 1.1;
}
.stat-card:nth-child(1) .stat-value { color: var(--accent); }
.stat-card:nth-child(2) .stat-value { color: var(--green); }
.stat-card:nth-child(3) .stat-value { color: var(--purple); }
.stat-card:nth-child(4) .stat-value { color: var(--cyan); }
.stat-sub { font-size: 12px; color: var(--dim); margin-top: 6px; }

/* ═══ 图表区域 ═══ */
.chart-section {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 16px; padding: 24px 28px; margin-bottom: 28px;
}
.chart-title {
  font-size: 18px; color: var(--heading); font-weight: 700;
  margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
}
.chart-area { width: 100%; height: 240px; position: relative; }
/* SVG 折线图 */
.chart-area svg { width: 100%; height: 100%; }
.chart-line { fill: none; stroke: var(--accent); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.chart-area-fill { fill: url(#chartGrad); opacity: .3; }
.chart-grid-line { stroke: var(--border); stroke-width: 1; stroke-dasharray: 4 4; }
.chart-label { font-size: 11px; fill: var(--dim); font-family: 'Menlo', monospace; }
.chart-dot { fill: var(--accent); r: 3; transition: r .15s; cursor: pointer; }
.chart-dot:hover { r: 5; }
.chart-tooltip {
  position: absolute; padding: 8px 14px; background: var(--card-bg);
  border: 1px solid var(--border); border-radius: 10px; font-size: 12px;
  color: var(--heading); pointer-events: none; z-index: 10;
  box-shadow: 0 4px 16px rgba(0,0,0,.3); white-space: nowrap;
  opacity: 0; transition: opacity .15s;
}

/* ═══ 两栏布局：Top 10 + 最近记录 ═══ */
.two-cols { display: grid; grid-template-columns: 1fr 2fr; gap: 24px; }
@media (max-width: 900px) { .two-cols { grid-template-columns: 1fr; } }

/* Top 10 列表 */
.top-section {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 16px; padding: 24px;
}
.top-section h2 {
  font-size: 18px; color: var(--heading); font-weight: 700;
  margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
}
.top-item {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,.04);
}
.top-item:last-child { border-bottom: none; }
.top-rank {
  width: 28px; height: 28px; border-radius: 8px; font-size: 13px;
  font-weight: 700; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.top-rank-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; }
.top-rank-2 { background: linear-gradient(135deg, #94a3b8, #64748b); color: #fff; }
.top-rank-3 { background: linear-gradient(135deg, #cd7f32, #b8690e); color: #fff; }
.top-rank-n { background: rgba(255,255,255,.06); color: var(--dim); }
.top-info { flex: 1; min-width: 0; }
.top-path {
  font-size: 14px; color: var(--heading); font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.top-meta { font-size: 12px; color: var(--dim); margin-top: 2px; }
.top-bar-bg {
  height: 4px; background: var(--bg); border-radius: 2px;
  margin-top: 6px; overflow: hidden;
}
.top-bar-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), var(--purple));
  transition: width .6s cubic-bezier(.4,0,.2,1);
}

/* ═══ 最近记录表格 ═══ */
.recent-section {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 16px; padding: 24px; overflow: hidden;
}
.recent-section h2 {
  font-size: 18px; color: var(--heading); font-weight: 700;
  margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
}
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th {
  text-align: left; padding: 12px 14px; font-weight: 600;
  color: var(--heading); background: var(--bg);
  border-bottom: 1px solid var(--border); white-space: nowrap; font-size: 13px;
}
td {
  padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,.03);
  vertical-align: middle; color: var(--text);
}
tr:hover td { background: rgba(108,140,255,.03); }
.td-path { color: var(--accent); font-weight: 500; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.td-time { font-family: 'Menlo', monospace; font-size: 12px; color: var(--dim); white-space: nowrap; }
.td-duration { font-family: 'Menlo', monospace; font-size: 12px; }
.td-geo { font-size: 12px; color: var(--dim); white-space: nowrap; }
.td-device { font-size: 12px; }
.device-badge {
  display: inline-block; padding: 2px 10px; border-radius: 8px;
  font-size: 11px; font-weight: 500;
}
.device-desktop { background: var(--accent-bg); color: var(--accent); }
.device-mobile { background: var(--green-bg); color: var(--green); }
.device-tablet { background: var(--purple-bg); color: var(--purple); }

/* 分页 */
.pagination {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; margin-top: 18px;
}
.page-btn {
  padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
  background: none; color: var(--dim); font-size: 12px; cursor: pointer;
  font-family: inherit; transition: all .15s;
}
.page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.page-btn:disabled { opacity: .3; cursor: not-allowed; }
.page-info { font-size: 12px; color: var(--dim); }

/* ═══ 空状态 / 加载 ═══ */
.loading { text-align: center; padding: 40px; color: var(--dim); font-size: 14px; }
.loading::before { content: '⏳ '; }
.empty-state { text-align: center; padding: 40px; color: var(--dim); font-size: 14px; }

/* ═══ Toast ═══ */
.toast {
  position: fixed; top: 24px; left: 50%;
  transform: translateX(-50%) translateY(-60px);
  background: var(--green); color: #000;
  padding: 12px 28px; border-radius: 10px; font-size: 15px; font-weight: 500;
  z-index: 9999; transition: transform .3s; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ═══ 登录遮罩 ═══ -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <h1>📊 访客统计管理</h1>
    <p class="sub">APM 专属知识库 — 仅限管理员访问</p>
    <input type="password" id="pwdInput" placeholder="请输入管理员密码" autocomplete="off"
           onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">🔐 验证身份</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ═══ 主看板 ═══ -->
<div class="dashboard hidden" id="dashboard">
  <!-- 顶栏 -->
  <div class="top-bar">
    <h1><span>📊</span> 访客统计看板</h1>
    <div class="top-actions">
      <button class="range-btn active" onclick="setRange(7, this)">7天</button>
      <button class="range-btn" onclick="setRange(30, this)">30天</button>
      <button class="range-btn" onclick="setRange(90, this)">90天</button>
      <a class="back-btn" href="index.html">🏠 返回知识库</a>
      <button class="logout-btn" onclick="doLogout()">🚪 退出</button>
    </div>
  </div>

  <!-- 统计卡片 -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card">
      <div class="stat-label">📈 总访问量</div>
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-sub" id="statTotalSub">加载中...</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">📅 今日访问</div>
      <div class="stat-value" id="statToday">—</div>
      <div class="stat-sub">今天 0:00 至今</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">👥 独立访客数</div>
      <div class="stat-value" id="statUnique">—</div>
      <div class="stat-sub" id="statUniqueSub">按 IP 去重</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">⏱️ 平均停留</div>
      <div class="stat-value" id="statDuration">—</div>
      <div class="stat-sub">秒 / 页面</div>
    </div>
  </div>

  <!-- 每日趋势图 -->
  <div class="chart-section">
    <div class="chart-title">📈 每日访问趋势</div>
    <div class="chart-area" id="chartArea">
      <div class="loading">加载数据中...</div>
    </div>
  </div>

  <!-- 两栏：Top 10 + 最近记录 -->
  <div class="two-cols">
    <!-- Top 10 -->
    <div class="top-section">
      <h2>🔥 热门页面 Top 10</h2>
      <div id="topList"><div class="loading">加载中...</div></div>
    </div>

    <!-- 最近记录 -->
    <div class="recent-section">
      <h2>🕐 最近访问记录</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>页面</th>
              <th>时间</th>
              <th>停留</th>
              <th>地区</th>
              <th>设备</th>
              <th>浏览器</th>
            </tr>
          </thead>
          <tbody id="recentBody">
            <tr><td colspan="6" class="loading">加载中...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</div>

<script>
/* ═══ 配置 ═══ */
// 部署 Worker 后替换为你的实际地址
var API_BASE = 'https://apm-analytics.YOUR_SUBDOMAIN.workers.dev';

var token = sessionStorage.getItem('apm_admin_token') || '';
var currentDays = 7;
var currentPage = 0;
var PAGE_SIZE = 30;

/* ═══ 初始化：检查是否已登录 ═══ */
(function init() {
  // 尝试从 analytics.js 获取 API 地址
  if (window.__APM_ANALYTICS_API) {
    API_BASE = window.__APM_ANALYTICS_API;
  }

  if (token) {
    // 验证 token 是否有效
    apiFetch('/api/admin/stats?days=1').then(function() {
      showDashboard();
    }).catch(function() {
      token = '';
      sessionStorage.removeItem('apm_admin_token');
    });
  }
})();

/* ═══ 登录 ═══ */
function doLogin() {
  var pwd = document.getElementById('pwdInput').value.trim();
  if (!pwd) { document.getElementById('loginError').textContent = '请输入密码'; return; }

  document.getElementById('loginError').textContent = '';
  fetch(API_BASE + '/api/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pwd })
  }).then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        document.getElementById('loginError').textContent = '❌ ' + data.error;
        return;
      }
      token = data.token;
      sessionStorage.setItem('apm_admin_token', token);
      showDashboard();
    }).catch(function(e) {
      document.getElementById('loginError').textContent = '❌ 网络错误：请检查 Worker 地址是否正确';
    });
}

function doLogout() {
  token = '';
  sessionStorage.removeItem('apm_admin_token');
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('loginOverlay').classList.remove('hidden');
  document.getElementById('pwdInput').value = '';
}

function showDashboard() {
  document.getElementById('loginOverlay').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  loadAllData();
}

/* ═══ 数据加载 ═══ */
function loadAllData() {
  loadStats();
  loadTopPages();
  loadRecent();
}

function setRange(days, btn) {
  currentDays = days;
  document.querySelectorAll('.range-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  loadAllData();
}

function apiFetch(endpoint) {
  return fetch(API_BASE + endpoint, {
    headers: { 'Authorization': 'Bearer ' + token }
  }).then(function(r) {
    if (r.status === 401) {
      doLogout();
      throw new Error('未登录');
    }
    return r.json();
  });
}

/* ═══ 统计概览 ═══ */
function loadStats() {
  apiFetch('/api/admin/stats?days=' + currentDays).then(function(data) {
    document.getElementById('statTotal').textContent = formatNum(data.total);
    document.getElementById('statTotalSub').textContent = '最近 ' + currentDays + ' 天';
    document.getElementById('statToday').textContent = formatNum(data.today);
    document.getElementById('statUnique').textContent = formatNum(data.uniqueVisitors);
    document.getElementById('statDuration').textContent = data.avgDuration + 's';

    // 渲染趋势图
    renderChart(data.dailyTrend || []);
  }).catch(function(e) {
    console.error('Stats load error:', e);
  });
}

/* ═══ 趋势图（纯 SVG）═══ */
function renderChart(data) {
  var area = document.getElementById('chartArea');
  if (!data.length) {
    area.innerHTML = '<div class="empty-state">暂无数据</div>';
    return;
  }

  var W = area.clientWidth, H = 240;
  var padL = 50, padR = 20, padT = 20, padB = 40;
  var chartW = W - padL - padR, chartH = H - padT - padB;

  var maxV = Math.max.apply(null, data.map(function(d) { return d.count; })) || 1;
  maxV = Math.ceil(maxV * 1.15); // 顶部留白

  // 计算坐标点
  var points = data.map(function(d, i) {
    return {
      x: padL + (data.length > 1 ? i / (data.length - 1) * chartW : chartW / 2),
      y: padT + chartH - (d.count / maxV * chartH),
      date: d.date,
      count: d.count
    };
  });

  var polyline = points.map(function(p) { return p.x + ',' + p.y; }).join(' ');
  var areaPath = 'M' + padL + ',' + (padT + chartH) + ' '
    + points.map(function(p) { return 'L' + p.x + ',' + p.y; }).join(' ')
    + ' L' + points[points.length - 1].x + ',' + (padT + chartH) + ' Z';

  // Y 轴网格线
  var gridLines = '';
  var yLabels = '';
  for (var i = 0; i <= 4; i++) {
    var yVal = Math.round(maxV / 4 * i);
    var yPos = padT + chartH - (yVal / maxV * chartH);
    gridLines += '<line x1="' + padL + '" y1="' + yPos + '" x2="' + (W - padR) + '" y2="' + yPos + '" class="chart-grid-line"/>';
    yLabels += '<text x="' + (padL - 8) + '" y="' + (yPos + 4) + '" class="chart-label" text-anchor="end">' + yVal + '</text>';
  }

  // X 轴标签（最多显示 10 个）
  var xLabels = '';
  var step = Math.max(1, Math.ceil(data.length / 10));
  for (var i = 0; i < data.length; i += step) {
    var label = data[i].date.substring(5); // MM-DD
    xLabels += '<text x="' + points[i].x + '" y="' + (H - 8) + '" class="chart-label" text-anchor="middle">' + label + '</text>';
  }

  // 数据点
  var dots = points.map(function(p, i) {
    return '<circle cx="' + p.x + '" cy="' + p.y + '" class="chart-dot" data-idx="' + i + '"/>';
  }).join('');

  area.innerHTML = '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none">'
    + '<defs><linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">'
    + '<stop offset="0%" stop-color="' + 'var(--accent)' + '" stop-opacity=".3"/>'
    + '<stop offset="100%" stop-color="' + 'var(--accent)' + '" stop-opacity="0"/>'
    + '</linearGradient></defs>'
    + gridLines + yLabels + xLabels
    + '<path d="' + areaPath + '" class="chart-area-fill"/>'
    + '<polyline points="' + polyline + '" class="chart-line"/>'
    + dots
    + '</svg>'
    + '<div class="chart-tooltip" id="chartTip"></div>';

  // 悬浮提示
  area.querySelectorAll('.chart-dot').forEach(function(dot) {
    dot.addEventListener('mouseenter', function(e) {
      var idx = +this.getAttribute('data-idx');
      var p = points[idx];
      var tip = document.getElementById('chartTip');
      tip.innerHTML = '<strong>' + p.date + '</strong><br>' + p.count + ' 次访问';
      tip.style.left = Math.min(p.x, W - 140) + 'px';
      tip.style.top = (p.y - 50) + 'px';
      tip.style.opacity = '1';
    });
    dot.addEventListener('mouseleave', function() {
      document.getElementById('chartTip').style.opacity = '0';
    });
  });
}

/* ═══ 热门页面 Top 10 ═══ */
function loadTopPages() {
  apiFetch('/api/admin/top?days=' + currentDays).then(function(data) {
    var pages = data.pages || [];
    if (!pages.length) {
      document.getElementById('topList').innerHTML = '<div class="empty-state">暂无数据</div>';
      return;
    }

    var maxVisits = pages[0].visits || 1;
    var html = pages.map(function(p, i) {
      var rankCls = i < 3 ? 'top-rank-' + (i + 1) : 'top-rank-n';
      var title = p.page_title || p.page_path;
      var pct = Math.round(p.visits / maxVisits * 100);
      return '<div class="top-item">'
        + '<div class="top-rank ' + rankCls + '">' + (i + 1) + '</div>'
        + '<div class="top-info">'
        + '<div class="top-path" title="' + esc(p.page_path) + '">' + esc(title) + '</div>'
        + '<div class="top-meta">' + p.visits + ' 次访问 · 平均 ' + (p.avg_duration || 0) + 's</div>'
        + '<div class="top-bar-bg"><div class="top-bar-fill" style="width:' + pct + '%"></div></div>'
        + '</div></div>';
    }).join('');

    document.getElementById('topList').innerHTML = html;
  }).catch(function() {});
}

/* ═══ 最近访问记录 ═══ */
function loadRecent() {
  var offset = currentPage * PAGE_SIZE;
  apiFetch('/api/admin/recent?limit=' + PAGE_SIZE + '&offset=' + offset).then(function(data) {
    var records = data.records || [];
    var total = data.total || 0;

    if (!records.length) {
      document.getElementById('recentBody').innerHTML = '<tr><td colspan="6" class="empty-state">暂无数据</td></tr>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    var html = records.map(function(r) {
      var path = r.page_title || r.page_path;
      var time = formatTime(r.visit_time);
      var dur = r.duration > 0 ? r.duration + 's' : '—';
      var durColor = r.duration > 60 ? 'color:var(--green)' : r.duration > 10 ? 'color:var(--text)' : 'color:var(--dim)';
      var geo = r.city !== 'unknown' ? r.city + ', ' + r.country : r.country;
      var deviceCls = r.device === 'Mobile' ? 'device-mobile' : r.device === 'Tablet' ? 'device-tablet' : 'device-desktop';
      var deviceIcon = r.device === 'Mobile' ? '📱' : r.device === 'Tablet' ? '📟' : '🖥️';

      return '<tr>'
        + '<td class="td-path" title="' + esc(r.page_path) + '">' + esc(path) + '</td>'
        + '<td class="td-time">' + time + '</td>'
        + '<td class="td-duration" style="' + durColor + '">' + dur + '</td>'
        + '<td class="td-geo">' + esc(geo) + '</td>'
        + '<td class="td-device"><span class="device-badge ' + deviceCls + '">' + deviceIcon + ' ' + esc(r.device) + '</span></td>'
        + '<td style="font-size:12px;color:var(--dim)">' + esc(r.browser) + '</td>'
        + '</tr>';
    }).join('');

    document.getElementById('recentBody').innerHTML = html;

    // 分页
    var totalPages = Math.ceil(total / PAGE_SIZE);
    var pagHtml = '<button class="page-btn" onclick="goPage(' + (currentPage - 1) + ')"' + (currentPage <= 0 ? ' disabled' : '') + '>← 上一页</button>'
      + '<span class="page-info">' + (currentPage + 1) + ' / ' + totalPages + ' 页（共 ' + total + ' 条）</span>'
      + '<button class="page-btn" onclick="goPage(' + (currentPage + 1) + ')"' + (currentPage >= totalPages - 1 ? ' disabled' : '') + '>下一页 →</button>';
    document.getElementById('pagination').innerHTML = pagHtml;
  }).catch(function() {});
}

function goPage(page) {
  if (page < 0) return;
  currentPage = page;
  loadRecent();
}

/* ═══ 工具函数 ═══ */
function formatNum(n) {
  if (n >= 10000) return (n / 10000).toFixed(1) + 'w';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return n + '';
}

function formatTime(isoStr) {
  var d = new Date(isoStr);
  var mm = (d.getMonth() + 1 + '').padStart(2, '0');
  var dd = (d.getDate() + '').padStart(2, '0');
  var hh = (d.getHours() + '').padStart(2, '0');
  var mi = (d.getMinutes() + '').padStart(2, '0');
  return mm + '-' + dd + ' ' + hh + ':' + mi;
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

/* 窗口 resize 时重绘图表 */
var resizeTimer;
window.addEventListener('resize', function() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(function() {
    if (!document.getElementById('dashboard').classList.contains('hidden')) {
      loadStats();
    }
  }, 300);
});
</script>
