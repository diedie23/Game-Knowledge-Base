<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSV 色相精准提取器</title>
<style>
:root{--bg:#0d0f15;--panel:#141620;--card:#1a1d2b;--border:#262a3a;--text:#c5c9d6;--dim:#6b7085;--heading:#e4e6ed;--accent:#6c8cff;--accent2:#a78bfa;--red:#f87171;--green:#4ade80;--blue:#60a5fa;--yellow:#fbbf24;--orange:#fb923c}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#3d4155;border-radius:3px}
.app{max-width:1200px;margin:0 auto;padding:20px}
.hdr{text-align:center;padding:20px 0 16px}
.hdr h1{font-size:22px;color:var(--heading);margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.hdr h1 .ver{font-size:11px;background:var(--accent);color:#fff;padding:2px 8px;border-radius:10px}
.hdr p{color:var(--dim);font-size:13px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card-title{font-size:15px;color:var(--heading);font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}}
.img-box{position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:repeating-conic-gradient(#1a1c28 0% 25%,#15171f 0% 50%) 50%/16px 16px}
.img-box canvas{width:100%;display:block}
.img-label{position:absolute;top:8px;left:8px;font-size:11px;background:rgba(0,0,0,.75);padding:3px 8px;border-radius:4px;color:#fff}
.btn{padding:8px 18px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--accent);color:var(--heading)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.btn-primary:hover{background:#5a7aee}
.btn-green{background:var(--green);border-color:var(--green);color:#000;font-weight:500}
.drop-zone{border:2px dashed var(--border);border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:rgba(108,140,255,.04)}
.drop-zone h3{color:var(--heading);font-size:15px;margin-bottom:4px}
.drop-zone p{color:var(--dim);font-size:12px}

/* 参数面板 */
.param-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.param-row label{font-size:12px;color:var(--dim);min-width:90px;flex-shrink:0}
.param-row input[type=range]{flex:1;accent-color:var(--accent);height:4px}
.param-row .val{font-size:12px;color:var(--accent);min-width:40px;text-align:right;font-weight:600}
.param-row input[type=color]{width:40px;height:28px;border:1px solid var(--border);border-radius:6px;background:var(--card);cursor:pointer;padding:0}

/* 色相条 */
.hue-bar{width:100%;height:20px;border-radius:6px;background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00);border:1px solid var(--border);position:relative;cursor:crosshair;margin:8px 0}
.hue-marker{position:absolute;top:-3px;width:4px;height:26px;background:#fff;border-radius:2px;pointer-events:none;box-shadow:0 0 4px rgba(0,0,0,.5)}
.hue-range{position:absolute;top:0;height:100%;background:rgba(255,255,255,.2);border-radius:6px;pointer-events:none}

/* 通道列表 */
.ch-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.ch-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px}
.ch-swatch{width:28px;height:28px;border-radius:6px;flex-shrink:0;border:1px solid rgba(255,255,255,.1)}
.ch-info{flex:1;font-size:12px}
.ch-info .name{color:var(--heading);font-weight:500;font-size:13px}
.ch-info .detail{color:var(--dim);margin-top:2px}
.ch-remove{background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;padding:4px}
.ch-remove:hover{color:var(--red)}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--card);border:1px solid var(--accent);padding:10px 24px;border-radius:8px;font-size:13px;color:var(--heading);z-index:999;transition:transform .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.tip{background:rgba(108,140,255,.06);border:1px solid rgba(108,140,255,.15);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--dim);line-height:1.7;margin:10px 0}
.tip strong{color:var(--accent)}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <h1>🎨 HSV 色相精准提取器 <span class="ver">v1.0</span></h1>
  <p>吸取目标色 → HSV 色相匹配 → 保留明度灰度 → 边缘羽化 → 导出高质量通道图</p>
</div>

<!-- Step 1: Import -->
<div class="card" id="step1">
  <div class="card-title">📁 导入图片</div>
  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <h3>点击选择或拖放图片</h3>
    <p>支持 PNG / JPG</p>
  </div>
  <input type="file" id="fileInput" accept="image/*" style="display:none">
</div>

<!-- Step 2: 参数配置 + 色相吸取 -->
<div class="card" id="step2" style="display:none">
  <div class="card-title">🎯 色相提取参数</div>
  <div class="grid-2">
    <div>
      <div class="img-box" style="cursor:crosshair" id="srcBox">
        <canvas id="srcCanvas"></canvas>
        <span class="img-label">原图 — 点击吸取颜色</span>
      </div>
    </div>
    <div>
      <div class="tip"><strong>操作方法：</strong>在左侧原图上点击吸取目标颜色，或手动调整下方参数。每个通道（R/G/B）可设置不同的色相范围。</div>

      <div style="font-size:13px;color:var(--heading);margin:12px 0 8px">当前吸取色</div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div id="pickedSwatch" style="width:40px;height:40px;border-radius:8px;background:#666;border:1px solid var(--border)"></div>
        <div id="pickedInfo" style="font-size:12px;color:var(--dim)">尚未吸取</div>
        <button class="btn" onclick="addPickedToChannel()" id="addBtn" disabled>➕ 添加到通道</button>
      </div>

      <div style="font-size:13px;color:var(--heading);margin:8px 0">色相范围可视化</div>
      <div class="hue-bar" id="hueBar"><div class="hue-range" id="hueRange"></div><div class="hue-marker" id="hueMarker" style="left:0"></div></div>

      <div class="param-row"><label>色相容差 (Hue)</label><input type="range" id="hueTol" min="5" max="60" value="20" oninput="updateParams()"><span class="val" id="hueTolVal">±20°</span></div>
      <div class="param-row"><label>饱和度下限</label><input type="range" id="satMin" min="0" max="100" value="15" oninput="updateParams()"><span class="val" id="satMinVal">15%</span></div>
      <div class="param-row"><label>边缘平滑度</label><input type="range" id="edgeSoft" min="0" max="5" value="2" oninput="updateParams()"><span class="val" id="edgeSoftVal">2px</span></div>

      <div style="font-size:13px;color:var(--heading);margin:16px 0 8px">通道分配</div>
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <button class="btn" onclick="setActiveChannel('R')" id="chBtnR" style="border-color:#f66;color:#f66">R 通道</button>
        <button class="btn" onclick="setActiveChannel('G')" id="chBtnG">G 通道</button>
        <button class="btn" onclick="setActiveChannel('B')" id="chBtnB">B 通道</button>
      </div>
      <div class="ch-list" id="channelList"><div style="font-size:12px;color:var(--dim);padding:8px">尚未添加色相区域，请在原图上点击吸取</div></div>

      <button class="btn btn-primary" onclick="generateHSVMask()" style="margin-top:16px;width:100%;justify-content:center" id="genBtn" disabled>🔬 生成灰度 Mask</button>
    </div>
  </div>
</div>

<!-- Step 3: 三视窗预览 -->
<div class="card" id="step3" style="display:none">
  <div class="card-title">👁️ 三视窗预览对比</div>
  <div class="grid-3">
    <div class="img-box"><canvas id="prevOriginal"></canvas><span class="img-label">原图</span></div>
    <div class="img-box"><canvas id="prevMask"></canvas><span class="img-label">灰度 Mask</span></div>
    <div class="img-box"><canvas id="prevOverlay"></canvas><span class="img-label">叠加预览</span></div>
  </div>
  <div style="margin-top:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
    <button class="btn btn-green" onclick="downloadMask()">⬇ 下载灰度 Mask</button>
    <button class="btn" onclick="downloadComposite()">⬇ 下载合成 Mask (RGB)</button>
    <button class="btn" onclick="downloadAll()">📦 下载全部</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
var srcImage=null,srcW=0,srcH=0,srcPixels=null;
var hsvData=null; // Float32Array: h,s,v per pixel
var pickedHue=-1,pickedSat=0,pickedVal=0,pickedRGB=[128,128,128];
var activeChannel='R';
var channels={R:[],G:[],B:[]}; // each: [{hue,hueTol,satMin,rgb}]
var maskDataRGB=null; // ImageData with grayscale in R/G/B

// ═══ RGB ↔ HSV ═══
function rgb2hsv(r,g,b){
  r/=255;g/=255;b/=255;
  var mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
  var h=0,s=mx===0?0:d/mx,v=mx;
  if(d!==0){
    if(mx===r) h=60*((g-b)/d%6);
    else if(mx===g) h=60*((b-r)/d+2);
    else h=60*((r-g)/d+4);
    if(h<0) h+=360;
  }
  return [h,s*100,v*100];
}

// ═══ File Import ═══
var dropZone=document.getElementById('dropZone');
var fileInput=document.getElementById('fileInput');
dropZone.addEventListener('dragover',function(e){e.preventDefault();dropZone.classList.add('dragover');});
dropZone.addEventListener('dragleave',function(){dropZone.classList.remove('dragover');});
dropZone.addEventListener('drop',function(e){e.preventDefault();dropZone.classList.remove('dragover');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});
fileInput.addEventListener('change',function(){if(this.files[0])loadFile(this.files[0]);});

function loadFile(file){
  var img=new Image();
  img.onload=function(){
    srcImage=img;srcW=img.width;srcH=img.height;
    // Draw source
    var c=document.getElementById('srcCanvas');c.width=srcW;c.height=srcH;
    var ctx=c.getContext('2d');ctx.drawImage(img,0,0);
    srcPixels=ctx.getImageData(0,0,srcW,srcH).data;
    // Compute HSV
    var total=srcW*srcH;
    hsvData=new Float32Array(total*3);
    for(var i=0;i<total;i++){
      var idx=i*4;
      var hsv=rgb2hsv(srcPixels[idx],srcPixels[idx+1],srcPixels[idx+2]);
      hsvData[i*3]=hsv[0];hsvData[i*3+1]=hsv[1];hsvData[i*3+2]=hsv[2];
    }
    document.getElementById('step2').style.display='block';
    document.getElementById('step1').style.display='none';
    // Click to pick
    c.addEventListener('click',pickColor);
    toast(srcW+'×'+srcH+' 已加载');
  };
  img.src=URL.createObjectURL(file);
}

// ═══ Color Picker ═══
function pickColor(e){
  var c=document.getElementById('srcCanvas');
  var rect=c.getBoundingClientRect();
  var sx=Math.floor((e.clientX-rect.left)/rect.width*srcW);
  var sy=Math.floor((e.clientY-rect.top)/rect.height*srcH);
  var idx=(sy*srcW+sx);
  var pi=idx*4;
  var r=srcPixels[pi],g=srcPixels[pi+1],b=srcPixels[pi+2];
  pickedRGB=[r,g,b];
  var hsv=rgb2hsv(r,g,b);
  pickedHue=hsv[0];pickedSat=hsv[1];pickedVal=hsv[2];
  // Update UI
  var hex='#'+[r,g,b].map(function(v){return v.toString(16).padStart(2,'0')}).join('');
  document.getElementById('pickedSwatch').style.background=hex;
  document.getElementById('pickedInfo').innerHTML='<b>'+hex+'</b> · H:'+pickedHue.toFixed(0)+'° S:'+pickedSat.toFixed(0)+'% V:'+pickedVal.toFixed(0)+'%';
  document.getElementById('addBtn').disabled=false;
  // Hue bar marker
  document.getElementById('hueMarker').style.left=(pickedHue/360*100)+'%';
  updateHueRange();
  // Live preview
  updateLivePreview();
}

function updateParams(){
  var ht=document.getElementById('hueTol').value;
  var sm=document.getElementById('satMin').value;
  var es=document.getElementById('edgeSoft').value;
  document.getElementById('hueTolVal').textContent='±'+ht+'°';
  document.getElementById('satMinVal').textContent=sm+'%';
  document.getElementById('edgeSoftVal').textContent=es+'px';
  updateHueRange();
  if(pickedHue>=0) updateLivePreview();
}

function updateHueRange(){
  var tol=parseInt(document.getElementById('hueTol').value);
  var range=document.getElementById('hueRange');
  if(pickedHue<0){range.style.display='none';return;}
  range.style.display='block';
  var left=((pickedHue-tol+360)%360)/360*100;
  var width=tol*2/360*100;
  range.style.left=left+'%';range.style.width=width+'%';
}

function updateLivePreview(){
  if(!hsvData||pickedHue<0) return;
  // Quick preview: highlight matching pixels on srcCanvas
  var c=document.getElementById('srcCanvas');
  var ctx=c.getContext('2d');
  ctx.drawImage(srcImage,0,0);
  var img=ctx.getImageData(0,0,srcW,srcH);
  var d=img.data;
  var tol=parseInt(document.getElementById('hueTol').value);
  var satMin=parseInt(document.getElementById('satMin').value);
  var total=srcW*srcH;
  for(var i=0;i<total;i++){
    var h=hsvData[i*3],s=hsvData[i*3+1];
    var match=hueDist(h,pickedHue)<=tol && s>=satMin;
    if(!match){
      var idx=i*4;
      d[idx]=Math.round(d[idx]*0.25);d[idx+1]=Math.round(d[idx+1]*0.25);d[idx+2]=Math.round(d[idx+2]*0.25);
    }
  }
  ctx.putImageData(img,0,0);
}

function hueDist(h1,h2){var d=Math.abs(h1-h2);return d>180?360-d:d;}

// ═══ Channel Management ═══
function setActiveChannel(ch){
  activeChannel=ch;
  ['R','G','B'].forEach(function(c){
    var btn=document.getElementById('chBtn'+c);
    var colors={R:'#f66',G:'#6f6',B:'#66f'};
    if(c===ch){btn.style.borderColor=colors[c];btn.style.color=colors[c];btn.style.background='rgba(255,255,255,.03)';}
    else{btn.style.borderColor='';btn.style.color='';btn.style.background='';}
  });
}

function addPickedToChannel(){
  if(pickedHue<0) return;
  var tol=parseInt(document.getElementById('hueTol').value);
  var satMin=parseInt(document.getElementById('satMin').value);
  channels[activeChannel].push({hue:pickedHue,hueTol:tol,satMin:satMin,rgb:pickedRGB.slice()});
  renderChannelList();
  document.getElementById('genBtn').disabled=false;
  toast('已添加到 '+activeChannel+' 通道');
  // Reset picker view
  var ctx=document.getElementById('srcCanvas').getContext('2d');
  ctx.drawImage(srcImage,0,0);
}

function removeFromChannel(ch,idx){
  channels[ch].splice(idx,1);
  renderChannelList();
  if(channels.R.length+channels.G.length+channels.B.length===0) document.getElementById('genBtn').disabled=true;
}

function renderChannelList(){
  var html='';
  var chNames={R:'R 通道',G:'G 通道',B:'B 通道'};
  var chColors={R:'#f66',G:'#6f6',B:'#66f'};
  ['R','G','B'].forEach(function(ch){
    if(!channels[ch].length) return;
    html+='<div style="font-size:11px;color:'+chColors[ch]+';font-weight:600;margin-top:6px">'+chNames[ch]+'</div>';
    channels[ch].forEach(function(item,i){
      var hex='#'+item.rgb.map(function(v){return v.toString(16).padStart(2,'0')}).join('');
      html+='<div class="ch-item"><div class="ch-swatch" style="background:'+hex+'"></div>'
        +'<div class="ch-info"><div class="name">H:'+item.hue.toFixed(0)+'° ±'+item.hueTol+'°</div>'
        +'<div class="detail">饱和度≥'+item.satMin+'%</div></div>'
        +'<button class="ch-remove" onclick="removeFromChannel(\''+ch+'\','+i+')">✕</button></div>';
    });
  });
  if(!html) html='<div style="font-size:12px;color:var(--dim);padding:8px">尚未添加色相区域</div>';
  document.getElementById('channelList').innerHTML=html;
}

// ═══ Core: Generate HSV Mask with Luma + Edge Feathering ═══
function generateHSVMask(){
  if(!hsvData) return;
  var total=srcW*srcH;
  var edgeSoft=parseInt(document.getElementById('edgeSoft').value);

  // 1. 为每个通道计算 raw mask (float 0~1, preserving luminance)
  var rawR=new Float32Array(total);
  var rawG=new Float32Array(total);
  var rawB=new Float32Array(total);

  for(var i=0;i<total;i++){
    var h=hsvData[i*3],s=hsvData[i*3+1],v=hsvData[i*3+2];
    var pi=i*4;
    var alpha=srcPixels[pi+3];
    if(alpha<10) continue; // Skip transparent

    // 计算每个通道的匹配度 (smoothstep)
    ['R','G','B'].forEach(function(ch){
      var raw=ch==='R'?rawR:ch==='G'?rawG:rawB;
      var best=0;
      channels[ch].forEach(function(item){
        var hd=hueDist(h,item.hue);
        if(s<item.satMin*0.5) return; // Hard reject very low saturation
        // Smoothstep for hue
        var hueMatch=hd<=item.hueTol?1:hd<=item.hueTol*1.5?smoothstep(item.hueTol*1.5,item.hueTol,hd):0;
        // Smoothstep for saturation
        var satMatch=s>=item.satMin?1:s>=item.satMin*0.5?smoothstep(item.satMin*0.5,item.satMin,s):0;
        var match=hueMatch*satMatch;
        if(match>best) best=match;
      });
      // Multiply by luminance (V channel / 100) to preserve grayscale detail
      raw[i]=best*(v/100);
    });
  }

  // 2. Edge feathering: box blur on raw masks
  if(edgeSoft>0){
    rawR=blurFloat(rawR,srcW,srcH,edgeSoft);
    rawG=blurFloat(rawG,srcW,srcH,edgeSoft);
    rawB=blurFloat(rawB,srcW,srcH,edgeSoft);
  }

  // 3. Ensure mutual exclusivity: at each pixel, keep only the strongest channel
  for(var i=0;i<total;i++){
    var r=rawR[i],g=rawG[i],b=rawB[i];
    var mx=Math.max(r,g,b);
    if(mx<0.01){rawR[i]=0;rawG[i]=0;rawB[i]=0;continue;}
    // Only keep the dominant channel
    if(r>=g&&r>=b){rawG[i]=0;rawB[i]=0;}
    else if(g>=r&&g>=b){rawR[i]=0;rawB[i]=0;}
    else{rawR[i]=0;rawG[i]=0;}
  }

  // 4. Convert to ImageData
  maskDataRGB=new ImageData(srcW,srcH);
  var d=maskDataRGB.data;
  for(var i=0;i<total;i++){
    var idx=i*4;
    d[idx]=Math.round(rawR[i]*255);
    d[idx+1]=Math.round(rawG[i]*255);
    d[idx+2]=Math.round(rawB[i]*255);
    d[idx+3]=(d[idx]>0||d[idx+1]>0||d[idx+2]>0)?255:0;
  }

  // 5. Render 3-window preview
  renderTriplePreview();
  document.getElementById('step3').style.display='block';
  document.getElementById('step3').scrollIntoView({behavior:'smooth'});
  toast('Mask 生成完成');
}

function smoothstep(edge0,edge1,x){
  var t=Math.max(0,Math.min(1,(x-edge0)/(edge1-edge0)));
  return t*t*(3-2*t);
}

function blurFloat(data,w,h,radius){
  var out=new Float32Array(data.length);
  // Horizontal pass
  var temp=new Float32Array(data.length);
  for(var y=0;y<h;y++){
    for(var x=0;x<w;x++){
      var sum=0,cnt=0;
      for(var dx=-radius;dx<=radius;dx++){
        var nx=x+dx;if(nx<0||nx>=w)continue;
        sum+=data[y*w+nx];cnt++;
      }
      temp[y*w+x]=sum/cnt;
    }
  }
  // Vertical pass
  for(var y=0;y<h;y++){
    for(var x=0;x<w;x++){
      var sum=0,cnt=0;
      for(var dy=-radius;dy<=radius;dy++){
        var ny=y+dy;if(ny<0||ny>=h)continue;
        sum+=temp[ny*w+x];cnt++;
      }
      out[y*w+x]=sum/cnt;
    }
  }
  return out;
}

function renderTriplePreview(){
  // 1. Original
  var c1=document.getElementById('prevOriginal');c1.width=srcW;c1.height=srcH;
  c1.getContext('2d').drawImage(srcImage,0,0);

  // 2. Grayscale Mask (show each channel's grayscale)
  var c2=document.getElementById('prevMask');c2.width=srcW;c2.height=srcH;
  var ctx2=c2.getContext('2d');
  var img2=ctx2.createImageData(srcW,srcH);
  var d2=img2.data,dm=maskDataRGB.data;
  for(var i=0;i<dm.length;i+=4){
    var v=Math.max(dm[i],dm[i+1],dm[i+2]);
    d2[i]=v;d2[i+1]=v;d2[i+2]=v;d2[i+3]=255;
  }
  ctx2.putImageData(img2,0,0);

  // 3. Overlay: original with mask tinted
  var c3=document.getElementById('prevOverlay');c3.width=srcW;c3.height=srcH;
  var ctx3=c3.getContext('2d');ctx3.drawImage(srcImage,0,0);
  var img3=ctx3.getImageData(0,0,srcW,srcH);
  var d3=img3.data;
  var tints={R:[255,80,80],G:[80,255,80],B:[80,120,255]};
  for(var i=0;i<d3.length;i+=4){
    var mr=dm[i],mg=dm[i+1],mb=dm[i+2];
    var mx=Math.max(mr,mg,mb);
    if(mx<5) continue;
    var t=mr>=mg&&mr>=mb?tints.R:mg>=mr&&mg>=mb?tints.G:tints.B;
    var blend=mx/255*0.5;
    d3[i]=Math.round(d3[i]*(1-blend)+t[0]*blend);
    d3[i+1]=Math.round(d3[i+1]*(1-blend)+t[1]*blend);
    d3[i+2]=Math.round(d3[i+2]*(1-blend)+t[2]*blend);
  }
  ctx3.putImageData(img3,0,0);
}

// ═══ Download ═══
function downloadMask(){
  if(!maskDataRGB) return;
  // Export as grayscale (V channel)
  var c=document.createElement('canvas');c.width=srcW;c.height=srcH;
  var ctx=c.getContext('2d');
  var img=ctx.createImageData(srcW,srcH);
  var d=img.data,dm=maskDataRGB.data;
  for(var i=0;i<dm.length;i+=4){
    var v=Math.max(dm[i],dm[i+1],dm[i+2]);
    d[i]=v;d[i+1]=v;d[i+2]=v;d[i+3]=255;
  }
  ctx.putImageData(img,0,0);
  dlCanvas(c,'mask_grayscale.png');
}

function downloadComposite(){
  if(!maskDataRGB) return;
  var c=document.createElement('canvas');c.width=srcW;c.height=srcH;
  c.getContext('2d').putImageData(maskDataRGB,0,0);
  dlCanvas(c,'mask_composite_rgb.png');
}

async function downloadAll(){
  if(!maskDataRGB||typeof JSZip==='undefined') return;
  var zip=new JSZip();
  // Original
  var c0=document.createElement('canvas');c0.width=srcW;c0.height=srcH;c0.getContext('2d').drawImage(srcImage,0,0);
  zip.file('original.png',await cBlob(c0));
  // Composite
  var c1=document.createElement('canvas');c1.width=srcW;c1.height=srcH;c1.getContext('2d').putImageData(maskDataRGB,0,0);
  zip.file('mask_composite.png',await cBlob(c1));
  // Per-channel grayscale
  ['R','G','B'].forEach(async function(ch,ci){
    var cc=document.createElement('canvas');cc.width=srcW;cc.height=srcH;
    var ctx=cc.getContext('2d');var img=ctx.createImageData(srcW,srcH);
    var d=img.data,dm=maskDataRGB.data;
    for(var i=0;i<dm.length;i+=4){var v=dm[i+ci];d[i]=v;d[i+1]=v;d[i+2]=v;d[i+3]=255;}
    ctx.putImageData(img,0,0);
    zip.file('mask_'+ch+'.png',await cBlob(cc));
  });
  // Grayscale
  var cg=document.createElement('canvas');cg.width=srcW;cg.height=srcH;
  var ctxg=cg.getContext('2d');var imgg=ctxg.createImageData(srcW,srcH);
  var dg=imgg.data,dm=maskDataRGB.data;
  for(var i=0;i<dm.length;i+=4){var v=Math.max(dm[i],dm[i+1],dm[i+2]);dg[i]=v;dg[i+1]=v;dg[i+2]=v;dg[i+3]=255;}
  ctxg.putImageData(imgg,0,0);
  zip.file('mask_grayscale.png',await cBlob(cg));
  // Overlay
  zip.file('preview_overlay.png',await cBlob(document.getElementById('prevOverlay')));

  var blob=await zip.generateAsync({type:'blob'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='hsv_mask_output.zip';a.click();
  toast('ZIP 已下载');
}

function dlCanvas(c,name){c.toBlob(function(b){var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();},'image/png');}
function cBlob(c){return new Promise(function(r){c.toBlob(function(b){r(b)},'image/png')});}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500);}
</script>
