<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文档占位</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0f1117;color:#c9cdd4;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px}
  .placeholder{text-align:center;max-width:520px}
  .placeholder .icon{font-size:64px;margin-bottom:24px;opacity:.6}
  .placeholder h1{font-size:24px;color:#e8eaed;font-weight:700;margin-bottom:12px}
  .placeholder p{font-size:15px;color:#8b8fa3;line-height:1.8;margin-bottom:24px}
  .placeholder .badge{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;background:rgba(108,140,255,.08);border:1px solid rgba(108,140,255,.15);border-radius:12px;color:#6c8cff;font-size:13px;font-weight:500}
  .placeholder .hint{margin-top:32px;padding:16px 20px;background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.12);border-radius:12px;font-size:13px;color:#fbbf24;line-height:1.7;text-align:left}
</style>
</head>
<body>
<div class="placeholder">
  <div class="icon">📄</div>
  <h1>文档编写中</h1>
  <p>该文档正在规划与编写中，敬请期待。<br>如果你对该文档有需求或建议，欢迎通过反馈按钮联系我们。</p>
  <span class="badge">🚧 Coming Soon</span>
  <div class="hint">
    💡 <strong>提示：</strong>你可以在知识库首页点击 <strong>➕ 新增文档</strong> 来帮助补充该内容。也可以联系文档责任人了解编写进度。
  </div>
</div>
</body>
</html>
